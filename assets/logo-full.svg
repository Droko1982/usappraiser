<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 320" width="1180" height="320" role="img" aria-label="US Appraiser">
  <defs>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a3161"/><stop offset="1" stop-color="#041e42"/>
    </linearGradient>
    <clipPath id="roofclip"><polygon points="256,116 404,236 108,236"/></clipPath>
  </defs>

  <!-- emblem (scaled) -->
  <g transform="translate(16,24) scale(0.53)">
    <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#badge)"/>
    <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="#b31942" stroke-width="10" opacity="0.95"/>
    <rect x="150" y="236" width="212" height="150" fill="#ffffff"/>
    <rect x="238" y="306" width="38" height="80" fill="#0a3161"/>
    <rect x="174" y="266" width="42" height="42" fill="#0a3161"/>
    <rect x="296" y="266" width="42" height="42" fill="#0a3161"/>
    <g clip-path="url(#roofclip)">
      <rect x="108" y="116" width="296" height="120" fill="#ffffff"/>
      <rect x="108" y="116" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="150" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="184" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="218" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="116" width="128" height="68" fill="#0a3161"/>
      <g fill="#ffffff">
        <circle cx="132" cy="134" r="5"/><circle cx="162" cy="134" r="5"/><circle cx="192" cy="134" r="5"/><circle cx="222" cy="134" r="5"/>
        <circle cx="147" cy="158" r="5"/><circle cx="177" cy="158" r="5"/><circle cx="207" cy="158" r="5"/>
      </g>
    </g>
    <polygon points="256,116 404,236 108,236" fill="none" stroke="#0a3161" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <!-- wordmark -->
  <text x="312" y="176" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="112" letter-spacing="1">
    <tspan fill="#b31942">US</tspan><tspan fill="#0a3161"> APPRAISER</tspan>
  </text>
  <text x="316" y="228" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="33" letter-spacing="7.5" fill="#4a5768">REAL ESTATE APPRAISALS · USPAP</text>
