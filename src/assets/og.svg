<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041e42"/><stop offset="0.55" stop-color="#0a3161"/><stop offset="1" stop-color="#12325a"/>
    </linearGradient>
    <linearGradient id="badge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0a3161"/><stop offset="1" stop-color="#041e42"/>
    </linearGradient>
    <clipPath id="roofclip"><polygon points="256,116 404,236 108,236"/></clipPath>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- top flag stripe -->
  <rect x="0" y="0" width="1200" height="10" fill="#b31942"/>
  <rect x="0" y="10" width="1200" height="6" fill="#ffffff"/>
  <rect x="26" y="30" width="1148" height="570" rx="24" fill="none" stroke="#b31942" stroke-width="3" opacity="0.65"/>

  <!-- emblem on white chip -->
  <rect x="92" y="120" width="200" height="200" rx="44" fill="#ffffff"/>
  <g transform="translate(112,140) scale(0.3125)">
    <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#badge)"/>
    <rect x="24" y="24" width="464" height="464" rx="100" fill="none" stroke="#b31942" stroke-width="10" opacity="0.95"/>
    <rect x="150" y="236" width="212" height="150" fill="#ffffff"/>
    <rect x="238" y="306" width="38" height="80" fill="#0a3161"/>
    <rect x="174" y="266" width="42" height="42" fill="#0a3161"/>
    <rect x="296" y="266" width="42" height="42" fill="#0a3161"/>
    <g clip-path="url(#roofclip)">
      <rect x="108" y="116" width="296" height="120" fill="#ffffff"/>
      <rect x="108" y="116" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="150" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="184" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="218" width="296" height="17" fill="#b31942"/>
      <rect x="108" y="116" width="128" height="68" fill="#0a3161"/>
      <g fill="#ffffff">
        <circle cx="132" cy="134" r="5"/><circle cx="162" cy="134" r="5"/><circle cx="192" cy="134" r="5"/><circle cx="222" cy="134" r="5"/>
        <circle cx="147" cy="158" r="5"/><circle cx="177" cy="158" r="5"/><circle cx="207" cy="158" r="5"/>
      </g>
    </g>
    <polygon points="256,116 404,236 108,236" fill="none" stroke="#0a3161" stroke-width="7" stroke-linejoin="round"/>
  </g>

  <!-- brand wordmark -->
  <text x="332" y="205" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="86" letter-spacing="1">
    <tspan fill="#ffffff">US </tspan><tspan fill="#e8b9c4">Appraiser</tspan>
  </text>
  <text x="336" y="250" font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="26" letter-spacing="6" fill="#a9bcd6">REAL ESTATE APPRAISALS · USPAP</text>

  <!-- headline -->
  <text x="94" y="410" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="60" fill="#ffffff">Free Real Estate Appraisal Quotes</text>
  <text x="94" y="482" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="60" fill="#ffffff">— Anywhere in the <tspan fill="#f0a6b6">USA</tspan></text>

  <!-- value chips -->
  <g font-family="'Segoe UI', Arial, sans-serif" font-weight="700" font-size="22" fill="#0a3161">
    <rect x="94" y="520" width="304" height="48" rx="24" fill="#ffffff"/>
    <text x="118" y="550">State-certified · USPAP</text>
    <rect x="414" y="520" width="330" height="48" rx="24" fill="#ffffff"/>
    <text x="438" y="550">Residential &amp; Commercial</text>
  </g>

  <!-- url pill -->
  <rect x="854" y="520" width="252" height="48" rx="24" fill="#b31942"/>
  <text x="980" y="551" text-anchor="middle" font-family="'Segoe UI', Arial, sans-serif" font-weight="800" font-size="26" fill="#ffffff">usappraiser.com</text>
</svg>
